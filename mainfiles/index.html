<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryan Pathirana - Portfolio</title>
    <link rel="icon" type="image/x-icon" href="./assets/images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://maxst.icons8.com/vue-static/landings/line-awesome/line-awesome/1.3.0/css/line-awesome.min.css">
    <link href="./assets/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
    <style>
        .landing-page { min-height: 100vh; background: #0a0a0a; color: #fff; padding: 60px 20px; }
        .landing-page h1 { font-size: 28px; margin-bottom: 12px; font-weight: 600; }
        .landing-page .subtitle { color: #999; margin-bottom: 48px; }
        .theme-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; max-width: 1000px; margin: 0 auto; }
        .theme-card { display: block; background: #1a1a1a; border: 1px solid #333; border-radius: 16px; padding: 28px; text-decoration: none; color: #fff; transition: border-color .2s, transform .2s; }
        .theme-card:hover { border-color: var(--primary_color, #6cbb3c); transform: translateY(-2px); }
        .theme-card h3 { font-size: 18px; margin-bottom: 8px; font-weight: 600; }
        .theme-card p { color: #999; font-size: 14px; margin: 0; }
        .theme-card.main-demo { border-color: var(--primary_color, #6cbb3c); }
    </style>
</head>
<body class="landing-page">
    <div class="container text-center">
        <h1>Resume and Personal Portfolio</h1>
        <p class="subtitle">Choose a theme to open the portfolio</p>
        <div class="theme-cards">
            <a href="portfolio.html?theme=earth" class="theme-card">
                <h3>Earth</h3>
                <p>Earth lines sphere</p>
            </a>
            <a href="portfolio.html?theme=water" class="theme-card">
                <h3>Water</h3>
                <p>Water waves</p>
            </a>
            <a href="portfolio.html?theme=abstract" class="theme-card">
                <h3>Abstract</h3>
                <p>3D abstract roll</p>
            </a>
            <a href="portfolio.html?theme=lines" class="theme-card">
                <h3>Lines</h3>
                <p>Earth lines sphere</p>
            </a>
            <a href="portfolio.html?theme=liquids" class="theme-card">
                <h3>Liquids</h3>
                <p>Liquids wavy</p>
            </a>
        </div>
    </div>
</body>
</html>
